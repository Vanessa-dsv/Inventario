<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inventário · Biblioteca</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@700&family=Outfit:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:      #0f1117;
      --surface: #181c27;
      --surface2:#1f2436;
      --border:  #2a3047;
      --gold:    #d4a84b;
      --green:   #3ecf8e;
      --red:     #f87171;
      --text:    #e8e2d4;
      --muted:   #6b7280;
      --radius:  12px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    header {
      background: #13161f;
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    header h1 { font-family: 'Libre Baskerville', serif; font-size: 1.15rem; }
    header p  { font-size: .7rem; color: var(--gold); letter-spacing: .1em; text-transform: uppercase; margin-top: 2px; }
    .logo { font-size: 1.6rem; }
    .pill {
      margin-left: auto;
      display: flex; align-items: center; gap: 6px;
      background: var(--surface2); border: 1px solid var(--border);
      padding: 5px 12px; border-radius: 30px;
      font-size: .75rem; color: var(--muted);
    }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); box-shadow: 0 0 6px var(--green); }
    main { max-width: 600px; margin: 0 auto; padding: 24px 16px 60px; }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 16px;
    }
    .card-title {
      font-family: 'Libre Baskerville', serif;
      font-size: .95rem; color: var(--gold);
      margin-bottom: 16px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
    }
    label { display: block; font-size: .72rem; font-weight: 600; letter-spacing: .07em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
    input[type=text] {
      width: 100%; background: var(--surface2); border: 1.5px solid var(--border);
      border-radius: 8px; padding: 11px 14px;
      font-family: 'Outfit', sans-serif; font-size: 1rem; color: var(--text); outline: none;
    }
    input[type=text]:focus { border-color: var(--gold); }
    input[type=text]::placeholder { color: var(--muted); }
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 7px;
      padding: 11px 22px; border: none; border-radius: 8px;
      font-family: 'Outfit', sans-serif; font-size: .95rem; font-weight: 600;
      cursor: pointer; transition: opacity .15s;
    }
    .btn:active { opacity: .75; }
    .btn-gold  { background: var(--gold);  color: #111; }
    .btn-green { background: var(--green); color: #111; }
    .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
    .btn-ghost:hover { background: var(--surface2); color: var(--text); }
    .btn:disabled { opacity: .35; cursor: not-allowed; }
    .btn-row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 14px; }
    #reader {
      border-radius: 8px; overflow: hidden;
      background: var(--surface2); border: 1.5px dashed var(--border);
      min-height: 250px; display: flex; align-items: center; justify-content: center;
    }
    .placeholder { text-align: center; color: var(--muted); padding: 30px 20px; font-size: .88rem; line-height: 1.8; }
    .placeholder span { display: block; font-size: 2.5rem; margin-bottom: 10px; opacity: .35; }
    #last-scan {
      display: none; margin-top: 14px; padding: 14px 16px;
      border-radius: 8px; border: 1px solid var(--green);
      background: rgba(62,207,142,.07);
    }
    .ls-tombo  { font-family: 'Libre Baskerville', serif; font-size: 1.05rem; }
    .ls-titulo { font-size: .85rem; color: var(--muted); margin-top: 3px; }
    .ls-status { font-size: .8rem; color: var(--green); margin-top: 5px; }
    .counters { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 14px; }
    .count-box { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 14px; text-align: center; }
    .count-num { font-family: 'Libre Baskerville', serif; font-size: 2.2rem; color: var(--gold); line-height: 1; }
    .count-num.green { color: var(--green); }
    .count-label { font-size: .7rem; color: var(--muted); margin-top: 4px; text-transform: uppercase; letter-spacing: .06em; }
    #manual-area { display: none; margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border); }
    .manual-row { display: flex; gap: 8px; margin-top: 6px; align-items: center; }
    .manual-row input { flex: 1; min-width: 0; font-size: 1rem; }
    .manual-row .btn-gravar { padding: 11px 14px; font-size: .85rem; white-space: nowrap; flex-shrink: 0; }
    .log-scroll { max-height: 220px; overflow-y: auto; margin-top: 12px; border: 1px solid var(--border); border-radius: 8px; }
    table { width: 100%; border-collapse: collapse; font-size: .8rem; }
    thead { position: sticky; top: 0; background: var(--surface2); }
    th { padding: 8px 10px; text-align: left; color: var(--muted); font-weight: 600; border-bottom: 1px solid var(--border); }
    td { padding: 7px 10px; border-bottom: 1px solid rgba(42,48,71,.4); }
    tr:last-child td { border-bottom: none; }
    .tag-ok  { display:inline-block; padding:2px 7px; border-radius:4px; background:rgba(62,207,142,.15); color:var(--green); font-size:.7rem; }
    .tag-esp { display:inline-block; padding:2px 7px; border-radius:4px; background:rgba(212,168,75,.15); color:var(--gold); font-size:.7rem; }
    .collab-row { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
    .collab-name { font-size:.9rem; }
    .collab-name strong { color: var(--gold); }
    .trocar-btn { background:none; border:none; color:var(--muted); font-size:.78rem; cursor:pointer; font-family:'Outfit',sans-serif; }
    .trocar-btn:hover { color: var(--red); }
    #toast {
      position:fixed; bottom:24px; left:50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); padding: 11px 22px; border-radius: 30px;
      font-size: .85rem; box-shadow: 0 6px 30px rgba(0,0,0,.5);
      transition: transform .3s, opacity .3s; opacity: 0; z-index: 999;
      max-width: 90vw; text-align: center;
    }
    #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    @media(max-width:440px) {
      .btn-row { flex-direction: column; }
      .btn-row .btn { width: 100%; }
      /* manual-row NÃO empilha no celular */
    }
  </style>
</head>
<body>

<header>
  <div class="logo">📚</div>
  <div>
    <h1>Inventário de Acervo</h1>
    <p>Biblioteca</p>
  </div>
  <div class="pill">
    <div class="dot"></div>
    <span>conectado</span>
  </div>
</header>

<main>

  <!-- IDENTIFICAÇÃO -->
  <div class="card" id="card-id">
    <div class="card-title">👤 Quem está fazendo o inventário?</div>
    <label for="colaborador">Seu nome</label>
    <input type="text" id="colaborador" placeholder="Ex.: Maria Souza" autocomplete="name" />
    <div class="btn-row">
      <button class="btn btn-gold" onclick="confirmar()">Confirmar e iniciar</button>
    </div>
  </div>

  <!-- SCANNER -->
  <div class="card" id="card-scanner" style="display:none">
    <div class="card-title">📷 Leitura de QR Code</div>
    <div class="collab-row">
      <div class="collab-name">Colaborador: <strong id="nome-exibido"></strong></div>
      <button class="trocar-btn" onclick="sair()">⏻ Sair</button>
    </div>

    <div style="position:relative">
      <div id="reader">
        <div class="placeholder">
          <span>▦</span>
          Clique em <strong>Iniciar câmera</strong><br>e aponte para o QR Code do livro.
        </div>
      </div>
      <div id="scan-flash"></div>
      <div id="reader-overlay" style="
        display:none; position:absolute; inset:0;
        background:rgba(15,17,23,.82); border-radius:8px;
        align-items:center; justify-content:center;
        flex-direction:column; gap:10px; z-index:5;">
        <div style="font-size:2.5rem">✅</div>
        <div style="font-family:'Libre Baskerville',serif;font-size:1.1rem;color:#3ecf8e">Gravado!</div>
        <div style="font-size:.8rem;color:#6b7280">Aguarde para o próximo…</div>
      </div>
    </div>

    <div id="last-scan">
      <div class="ls-tombo"  id="ls-tombo"></div>
      <div class="ls-titulo" id="ls-titulo"></div>
      <div class="ls-status" id="ls-status"></div>
    </div>

    <div class="counters">
      <div class="count-box">
        <div class="count-num" id="cnt-lidos">0</div>
        <div class="count-label">lidos</div>
      </div>
      <div class="count-box">
        <div class="count-num green" id="cnt-gravados">0</div>
        <div class="count-label">gravados ✓</div>
      </div>
    </div>

    <div class="btn-row">
      <button class="btn btn-gold"  id="btn-start" onclick="iniciar()">▶ Iniciar câmera</button>
      <button class="btn btn-ghost" id="btn-stop"  onclick="parar()" style="display:none">⏹ Parar</button>
      <button class="btn btn-ghost" onclick="toggleManual()">✏️ Digitar</button>
    </div>

    <div id="manual-area">
      <label for="manual-input">Conteúdo do QR Code <small style="text-transform:none;letter-spacing:0;color:var(--muted)">(ex.: 00123|Dom Casmurro)</small></label>
      <div class="manual-row">
        <input type="text" id="manual-input" placeholder="Tombo|Título" />
        <button class="btn btn-green btn-gravar" onclick="gravarManual()">Gravar</button>
      </div>
    </div>
  </div>

  <!-- LOG -->
  <div class="card" id="card-log" style="display:none">
    <div class="card-title">📋 Registros desta sessão</div>
    <div class="log-scroll">
      <table>
        <thead><tr><th>#</th><th>Tombo</th><th>Título</th><th>Hora</th><th>Status</th></tr></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>

</main>

<div id="toast"></div>

<script>
// ── URL DO APPS SCRIPT (fixa) ────────────────────────────────
var SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx-d15luvxsBYu-1x1R3Ki2Fw2dKVTnJ_HfKkNukwt9_2OYALZofIXCi7a9CXe6ZuOz/exec';

// ── ESTADO ───────────────────────────────────────────────────
var colaborador   = '';
var registros     = [];
var scanner       = null;
var ativo         = false;
var bloqueado     = false; // impede releitura enquanto processa
var ultimoQR      = '';
var timerQR       = null;
var totalLidos    = 0;
var totalGravados = 0;

// ── INIT ─────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', function() {
  var nome = localStorage.getItem('inv_nome');
  if (nome) {
    colaborador = nome;
    mostrarScanner();
  }
  document.getElementById('colaborador').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') confirmar();
  });
  document.getElementById('manual-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') gravarManual();
  });

  // Desloga automaticamente ao fechar ou sair da página
  document.addEventListener('visibilitychange', function() {
    if (document.visibilityState === 'hidden' && colaborador) {
      deslogar();
    }
  });
  window.addEventListener('pagehide', function() {
    if (colaborador) deslogar();
  });
});

// ── IDENTIFICAÇÃO ────────────────────────────────────────────
function confirmar() {
  var val = document.getElementById('colaborador').value.trim();
  if (!val) { toast('Informe seu nome.'); return; }
  colaborador = val;
  localStorage.setItem('inv_nome', val);
  document.getElementById('card-id').style.display = 'none';
  mostrarScanner();
}

function sair() {
  if (!confirm('Deseja encerrar a sessão e sair?')) return;
  deslogar();
}

function deslogar() {
  parar();
  colaborador = '';
  registros   = [];
  totalLidos  = 0;
  totalGravados = 0;
  bloqueado   = false;
  ultimoQR    = '';
  localStorage.removeItem('inv_nome');
  // Limpa tabela e contadores
  document.getElementById('tbody').innerHTML = '';
  document.getElementById('cnt-lidos').textContent    = '0';
  document.getElementById('cnt-gravados').textContent = '0';
  document.getElementById('last-scan').style.display  = 'none';
  document.getElementById('colaborador').value = '';
  document.getElementById('card-scanner').style.display = 'none';
  document.getElementById('card-log').style.display     = 'none';
  document.getElementById('card-id').style.display      = 'block';
}

function mostrarScanner() {
  document.getElementById('nome-exibido').textContent = colaborador;
  document.getElementById('card-scanner').style.display = 'block';
  document.getElementById('card-log').style.display = 'block';
}

// ── SCANNER ──────────────────────────────────────────────────
function iniciar() {
  scanner = new Html5Qrcode('reader');
  scanner.start(
    { facingMode: 'environment' },
    { fps: 10, qrbox: { width: 250, height: 250 } },
    function(texto) { onLeitura(texto); },
    function() {}
  ).then(function() {
    ativo = true;
    document.getElementById('btn-start').style.display = 'none';
    document.getElementById('btn-stop').style.display  = 'inline-flex';
  }).catch(function(err) {
    toast('Câmera indisponível: ' + err);
  });
}

function parar() {
  if (scanner && ativo) {
    scanner.stop().then(function() {
      scanner.clear();
      ativo = false;
      document.getElementById('btn-start').style.display = 'inline-flex';
      document.getElementById('btn-stop').style.display  = 'none';
    }).catch(function() {});
  }
}

function onLeitura(texto) {
  if (bloqueado) return;          // scanner pausado após leitura
  if (texto === ultimoQR) return; // mesmo código em sequência
  ultimoQR = texto;
  bloqueado = true;               // bloqueia imediatamente
  processar(texto);
}

// ── BIP + FLASH ──────────────────────────────────────────────
function bipEFlash() {
  // Bip via Web Audio API (sem arquivo externo)
  try {
    var ctx  = new (window.AudioContext || window.webkitAudioContext)();
    var osc  = ctx.createOscillator();
    var gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.type            = 'sine';
    osc.frequency.value = 1046; // Dó agudo
    gain.gain.setValueAtTime(.4, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(.001, ctx.currentTime + .18);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + .18);
  } catch(e) {}

  // Tarja verde rápida sobre o reader
  var flash = document.getElementById('scan-flash');
  if (flash) {
    flash.classList.add('ativo');
    setTimeout(function() { flash.classList.remove('ativo'); }, 180);
  }
}

// ── PROCESSAR ────────────────────────────────────────────────
function processar(texto) {
  var partes = texto.split(';');
  var tombo  = partes[0].trim();
  var titulo = partes[1] ? partes[1].trim() : '—';
  var hora   = new Date().toLocaleTimeString('pt-BR');

  // Feedback imediato: bip + tarja verde
  bipEFlash();

  // Atualiza UI imediatamente
  totalLidos++;
  document.getElementById('cnt-lidos').textContent = totalLidos;

  var ls = document.getElementById('last-scan');
  ls.style.display = 'block';
  document.getElementById('ls-tombo').textContent  = 'Tombo: ' + tombo;
  document.getElementById('ls-titulo').textContent = titulo;
  document.getElementById('ls-status').textContent = '⏳ Enviando…';

  // Adiciona linha na tabela
  var idx = registros.length;
  registros.push({ tombo: tombo, titulo: titulo, hora: hora });
  var tbody = document.getElementById('tbody');
  var tr = document.createElement('tr');
  tr.id = 'tr-' + idx;
  tr.innerHTML = '<td>' + (idx+1) + '</td>'
    + '<td><strong>' + tombo + '</strong></td>'
    + '<td style="max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + titulo + '</td>'
    + '<td style="font-size:.75rem;white-space:nowrap">' + hora + '</td>'
    + '<td id="st-' + idx + '"><span class="tag-esp">…</span></td>';
  tbody.insertBefore(tr, tbody.firstChild);

  // Envia ao Apps Script
  var url = SCRIPT_URL + '?tombo=' + encodeURIComponent(tombo)
    + '&titulo='      + encodeURIComponent(titulo)
    + '&colaborador=' + encodeURIComponent(colaborador);

  fetch(url, { mode: 'no-cors' })
    .then(function() {
      // no-cors: não lemos a resposta, mas a requisição chegou
      gravar_ok(idx, tombo, titulo);
    })
    .catch(function(err) {
      // Mesmo em erro de rede, tenta confirmar (o servidor pode ter recebido)
      gravar_ok(idx, tombo, titulo);
    });
}

function gravar_ok(idx, tombo, titulo) {
  totalGravados++;
  document.getElementById('cnt-gravados').textContent = totalGravados;
  document.getElementById('ls-status').textContent = '✓ Gravado! Aponte para o próximo livro.';
  var el = document.getElementById('st-' + idx);
  if (el) el.innerHTML = '<span class="tag-ok">✓ Drive</span>';

  // Mostra overlay "Gravado!" sobre o reader por 2s, depois desbloqueia
  var overlay = document.getElementById('reader-overlay');
  if (overlay) {
    overlay.style.display = 'flex';
    setTimeout(function() {
      overlay.style.display = 'none';
      bloqueado = false;
      ultimoQR  = '';
    }, 2000);
  } else {
    setTimeout(function() { bloqueado = false; ultimoQR = ''; }, 2000);
  }
}

// ── MANUAL ────────────────────────────────────────────────────
function toggleManual() {
  var el = document.getElementById('manual-area');
  el.style.display = el.style.display === 'none' ? 'block' : 'none';
}

function gravarManual() {
  var val = document.getElementById('manual-input').value.trim();
  if (!val) { toast('Digite o conteúdo do QR Code.'); return; }
  processar(val);
  document.getElementById('manual-input').value = '';
}

// ── TOAST ─────────────────────────────────────────────────────
function toast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'show';
  clearTimeout(t._t);
  t._t = setTimeout(function() { t.className = ''; }, 3000);
}
</script>
</body>
</html>
